<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP查询工具</title>
    
    <!-- 已帮你插入百度统计代码 -->
    <script>
        var _hmt = _hmt || [];
        (function() {
          var hm = document.createElement("script");
          hm.src = "https://hm.baidu.com/hm.js?0f796bd1aca1d4d05ce81986c2a534ac";
          var s = document.getElementsByTagName("script")[0]; 
          s.parentNode.insertBefore(hm, s);
        })();
    </script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f5f7fa;display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
        .box{background:white;padding:30px;border-radius:16px;box-shadow:0 4px 20px #00000010;text-align:center}
        h2{margin-bottom:20px;color:#333}
        .item{margin:10px 0;font-size:16px;color:#555}
        .ip{color:#007bff;font-weight:bold}
    </style>
</head>
<body>
    <div class="box">
        <h2>🌍 你的IP信息</h2>
        <div class="item">IP地址：<span class="ip" id="ip">加载中...</span></div>
        <div class="item">地区：<span id="addr"></span></div>
    </div>

    <script>
        fetch("https://api.ip.sb/geoip")
        .then(res=>res.json())
        .then(data=>{
            document.getElementById("ip").innerText = data.ip;
            document.getElementById("addr").innerText = 
                (data.country||"") + " " + 
                (data.region||"") + " " + 
                (data.city||"");
        })
    </script>
</body>
</html>
